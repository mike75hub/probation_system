{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">{{ title }}</h4>
        <div class="d-flex gap-2">
            {% if target_user.is_officer %}
            <a href="{% url 'accounts:officer_detail' target_user.id %}" class="btn btn-outline-primary">
                <i class="fas fa-briefcase me-2"></i>Caseload
            </a>
            {% endif %}
            <a href="{% url 'accounts:users_list' %}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Back
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">First name</label>
                        <input class="form-control" name="first_name" value="{{ target_user.first_name }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Last name</label>
                        <input class="form-control" name="last_name" value="{{ target_user.last_name }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input class="form-control" name="email" value="{{ target_user.email }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone</label>
                        <input class="form-control" name="phone" value="{{ target_user.phone }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Designation</label>
                        <input class="form-control" name="designation" value="{{ target_user.designation }}">
                        <div class="form-text">Optional (use for officers).</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Role</label>
                        <select class="form-select" name="role">
                            {% for value, label in role_choices %}
                            <option value="{{ value }}" {% if target_user.role == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if target_user.is_active %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">Active</label>
                        </div>
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
