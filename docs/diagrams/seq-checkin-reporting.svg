<svg xmlns="http://www.w3.org/2000/svg" width="840" height="540" viewBox="0 0 840 540">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B" />
    </marker>
    <style>
      .title { font: 700 18px Inter, system-ui, -apple-system, Segoe UI, Arial; fill: #0F172A; }
      .label { font: 500 12px Inter, system-ui, -apple-system, Segoe UI, Arial; fill: #0F172A; }
      .small { font: 500 11px Inter, system-ui, -apple-system, Segoe UI, Arial; fill: #334155; }
      .muted { fill: #475569; }
    </style>
  </defs>

<text x="30" y="40" class="title">Sequence — Check-in: Schedule → Complete/Miss → Reporting</text>
<rect x="70" y="70" width="200" height="40" rx="10" ry="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="170" y="93" text-anchor="middle" class="label"><tspan x="170" dy="0">Officer</tspan></text>
<line x1="170" y1="110" x2="170" y2="500" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4 6"/>
<rect x="330" y="70" width="200" height="40" rx="10" ry="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="430" y="93" text-anchor="middle" class="label"><tspan x="430" dy="0">System</tspan></text>
<line x1="430" y1="110" x2="430" y2="500" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4 6"/>
<rect x="590" y="70" width="200" height="40" rx="10" ry="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="690" y="93" text-anchor="middle" class="label"><tspan x="690" dy="0">Reports/Dashboard</tspan></text>
<line x1="690" y1="110" x2="690" y2="500" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4 6"/>
<line x1="170" y1="100" x2="430" y2="100" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/><text x="300" y="94" text-anchor="middle" class="small muted">Schedule check-in (time, purpose)</text>
<line x1="170" y1="160" x2="430" y2="160" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/><text x="300" y="154" text-anchor="middle" class="small muted">Record outcome (completed/missed)</text>
<line x1="430" y1="220" x2="430" y2="220" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/><text x="430" y="214" text-anchor="middle" class="small muted">Update compliance + notes</text>
<line x1="430" y1="280" x2="690" y2="280" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/><text x="560" y="274" text-anchor="middle" class="small muted">Provide KPI inputs</text>
<line x1="170" y1="340" x2="690" y2="340" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/><text x="430" y="334" text-anchor="middle" class="small muted">View compliance dashboards/reports</text>
</svg>
