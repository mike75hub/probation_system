services:
  web:
    build: .
    container_name: probation_web
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn probation.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:
